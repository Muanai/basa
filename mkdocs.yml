site_name: BASA
site_url: https://Muanai.github.io/basa/
repo_name: BASA v0.1
repo_url: https://github.com/Muanai/basa
theme:
  name: material
  font:
    code: Consolas Regular
    text: DM Sans
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  features:
    - search.suggest
    - search.highlight
    - navigation.path
    - navigation.footer
plugins:
  - search
  - ask-ai:
      ai_menu_button_text: "Copy Page"
      sections:
        all: ["*.md", "**/*.md"]
markdown_extensions:
  - pymdownx.highlight:
      pygments_lang_class: true
  - pymdownx.superfences
nav:
  - Home: index.md
  - Installation: installation.md
  - Quick Start: quickstart.md
  - Guides:
    - Batch Processing: guides/batch-processing.md
    - Cleaning Social Media Text: guides/social-media.md
    - Typo Correction: guides/typo-correction.md
  - API Reference:
    - quick(): api/quick.md
    - normalize(): api/normalize.md
    - slang: api/slang.md
    - typo: api/typo.md
  - Design Philosophy: philosophy.md
  - FAQ: faq.md
  - Roadmap: roadmap.md
  - Changelog: changelog.md
  - About: about.md
extra_css:
  - stylesheets/custom.css

copyright: Copyright &copy; 2026 BASA
extra:
  social:
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/basa/
      name: BASA on PyPI
    - icon: fontawesome/brands/github
      link: https://github.com/Muanai/basa
      name: BASA on GitHub